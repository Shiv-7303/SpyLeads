# PostgreSQL
# Example docker-compose for local development
version: '3.8'
services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: spyleads
      POSTGRES_PASSWORD: spyleads
      POSTGRES_DB: spyleads
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:
